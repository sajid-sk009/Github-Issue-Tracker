              <p class="text-[14px] lg:text-[16px] font-medium text-[#1F2937]">
                Open
              </p>
            </div>
            <div class="flex items-center gap-2">
              <div class="bg-[#A855F7] size-[12px] rounded-[50%]"></div>
              <p class="text-[14px] lg:text-[16px] font-medium text-[#1F2937]">
                Closed
              </p>
            </div>
          </div>
        </div>
      </section>
